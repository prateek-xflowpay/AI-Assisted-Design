---
layout: none
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xflow AI-Assisted Design — Output Gallery</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0f1e36;
  --navy-mid: #1a2f50;
  --blue: #3e8bfe;
  --blue-light: #e8f1ff;
  --green: #16a34a;
  --green-light: #dcfce7;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --red: #b91c1c;
  --red-light: #fee2e2;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --border: #e5e7eb;
  --bar-h: 52px;
  --drawer-h: 48vh;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #0a1220;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 400;
}

.bar-brand {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.bar-logo {
  width: 26px; height: 26px;
  background: var(--blue);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff;
  flex-shrink: 0;
}
.bar-brand-name {
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,.5);
  white-space: nowrap;
}

.bar-divider {
  width: 1px; height: 20px;
  background: rgba(255,255,255,.12);
  flex-shrink: 0;
}

.bar-context {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  overflow: hidden;
}
.bar-project {
  font-size: 12px;
  color: rgba(255,255,255,.4);
  white-space: nowrap;
  flex-shrink: 0;
}
.bar-chevron { color: rgba(255,255,255,.2); font-size: 10px; flex-shrink: 0; }
.bar-round {
  font-size: 12px;
  color: rgba(255,255,255,.4);
  white-space: nowrap;
  flex-shrink: 0;
}
.bar-name {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.badge {
  font-size: 10px; font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.badge-primary   { background: var(--green-light); color: var(--green); }
.badge-fallback  { background: #d1fae5; color: #065f46; }
.badge-parked    { background: var(--amber-light); color: var(--amber); }
.badge-superseded{ background: var(--red-light); color: var(--red); }
.badge-review    { background: var(--blue-light); color: var(--blue); }
.badge-candidate { background: var(--blue-light); color: var(--blue); }
.badge-prototype { background: var(--purple-light); color: var(--purple); }

.bar-right {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  margin-left: auto;
}
.bar-counter {
  font-size: 12px;
  color: rgba(255,255,255,.35);
  white-space: nowrap;
}
.nav-btn {
  width: 32px; height: 32px;
  background: #f0b429;
  border: 1px solid #f0b429;
  border-radius: 7px;
  color: #0f1e36;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
  user-select: none;
}
.nav-btn:hover { background: #fcd34d; border-color: #fcd34d; }
.nav-btn:disabled { opacity: .3; cursor: default; }
.key-hint {
  font-size: 10px; color: rgba(255,255,255,.2);
  white-space: nowrap; display: none;
}
@media (min-width: 900px) { .key-hint { display: block; } }

/* ── MAIN STAGE ── */
#stage {
  position: fixed;
  top: var(--bar-h);
  left: 0; right: 0;
  bottom: 0;
  transition: bottom .3s cubic-bezier(.4,0,.2,1);
}
#stage.drawer-open {
  bottom: var(--drawer-h);
}

/* wireframe iframe */
#wf-iframe {
  width: 100%; height: 100%;
  border: none;
  display: block;
  background: #fff;
}

/* separator / round-break slides */
#sep-slide {
  display: none;
  width: 100%; height: 100%;
  align-items: center; justify-content: center;
  flex-direction: column;
  gap: 0;
  background: var(--navy);
}
#sep-slide.visible { display: flex; }

.sep-eyebrow {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: rgba(255,255,255,.3);
  margin-bottom: 16px;
}
.sep-icon { font-size: 56px; margin-bottom: 20px; }
.sep-title {
  font-size: 36px; font-weight: 800;
  letter-spacing: -1px; color: #fff;
  text-align: center;
  margin-bottom: 12px;
  max-width: 680px;
}
.sep-desc {
  font-size: 16px; color: rgba(255,255,255,.5);
  text-align: center; line-height: 1.6;
  max-width: 560px;
  margin-bottom: 32px;
}
.sep-stats {
  display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
}
.sep-stat {
  text-align: center;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  padding: 16px 24px;
}
.sep-stat-num {
  font-size: 28px; font-weight: 800;
  letter-spacing: -1px; color: #fff;
}
.sep-stat-label {
  font-size: 11px; color: rgba(255,255,255,.4);
  margin-top: 2px;
}
.sep-continue {
  margin-top: 40px;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: rgba(255,255,255,.3);
}
.sep-continue kbd {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 5px;
  padding: 3px 8px;
  font-family: inherit;
  font-size: 12px;
  color: rgba(255,255,255,.5);
}

/* round break slide */
.round-break-slide {
  display: none;
  width: 100%; height: 100%;
  align-items: center; justify-content: center;
  flex-direction: column;
  gap: 0;
  background: #0d1a2e;
}
.round-break-slide.visible { display: flex; }
.rb-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: rgba(255,255,255,.3);
  margin-bottom: 14px;
}
.rb-title {
  font-size: 28px; font-weight: 800;
  letter-spacing: -.5px; color: #fff;
  text-align: center; margin-bottom: 10px;
}
.rb-desc {
  font-size: 15px; color: rgba(255,255,255,.5);
  text-align: center; line-height: 1.6;
  max-width: 480px;
}
.rb-badges { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
.rb-badge {
  font-size: 12px; font-weight: 500;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.6);
  padding: 6px 14px;
  border-radius: 20px;
}

/* ── DETAILS DRAWER ── */
#drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--drawer-h);
  background: #fff;
  color: #111827;
  z-index: 300;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -4px 32px rgba(0,0,0,.3);
}
#drawer.open {
  transform: translateY(0);
}

.drawer-handle {
  width: 40px; height: 4px;
  background: #e5e7eb;
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
  cursor: pointer;
}

.drawer-header {
  padding: 10px 24px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.drawer-title { font-size: 15px; font-weight: 700; flex: 1; }
.drawer-close {
  width: 28px; height: 28px;
  background: var(--gray-light);
  border: none; border-radius: 6px;
  cursor: pointer; font-size: 14px;
  color: var(--gray);
  display: flex; align-items: center; justify-content: center;
}
.drawer-close:hover { background: var(--border); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-content: start;
}
@media (max-width: 700px) {
  .drawer-body { grid-template-columns: 1fr; }
}

.d-section { display: flex; flex-direction: column; gap: 6px; }
.d-section.full { grid-column: 1 / -1; }
.d-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--gray);
}
.d-text { font-size: 13px; line-height: 1.6; color: #111827; }
.d-model { font-size: 13px; font-weight: 600; color: var(--navy); }
.d-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.d-list li {
  font-size: 13px; line-height: 1.4; color: #111827;
  display: flex; gap: 6px;
}
.d-list li::before { content: "·"; color: var(--gray); flex-shrink: 0; }
.d-pro::before  { content: "✓"; color: var(--green)  !important; font-weight: 700; }
.d-con::before  { content: "✗"; color: var(--red)    !important; font-weight: 700; }
.d-best {
  font-size: 13px; background: var(--blue-light);
  color: #1e3a5f; border-radius: 7px;
  padding: 10px 13px; line-height: 1.5;
}
.d-revival {
  font-size: 13px; background: var(--amber-light);
  color: #78350f; border-radius: 7px;
  padding: 10px 13px; line-height: 1.5;
}
.d-note {
  font-size: 13px; background: var(--red-light);
  color: var(--red); border-radius: 7px;
  padding: 10px 13px; line-height: 1.5;
}

/* ── DETAILS BUTTON ── */
#details-btn {
  position: fixed;
  bottom: 20px; right: 20px;
  z-index: 500;
  background: var(--navy);
  color: #fff;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 24px;
  padding: 10px 18px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  transition: all .15s;
  font-family: inherit;
}
#details-btn:hover { background: var(--navy-mid); }
#details-btn.hidden { display: none; }

/* ── PROGRESS BAR ── */
#progress {
  position: fixed;
  top: var(--bar-h); left: 0;
  height: 2px;
  background: var(--blue);
  z-index: 399;
  transition: width .2s ease;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="bar-brand">
    <div class="bar-logo">X</div>
    <span class="bar-brand-name">AI-Assisted Design</span>
  </div>
  <div class="bar-divider"></div>
  <div class="bar-context">
    <span class="bar-project" id="bar-project"></span>
    <span class="bar-chevron" id="bar-chev1">›</span>
    <span class="bar-round" id="bar-round"></span>
    <span class="bar-chevron" id="bar-chev2">›</span>
    <span class="bar-name" id="bar-name"></span>
    <span id="bar-badge"></span>
  </div>
  <div class="bar-right">
    <span class="key-hint">← → keys to navigate</span>
    <span class="bar-counter" id="bar-counter">1 of 20</span>
    <button class="nav-btn" id="btn-prev" onclick="go(-1)">←</button>
    <button class="nav-btn" id="btn-next" onclick="go(1)">→</button>
  </div>
</div>

<!-- PROGRESS -->
<div id="progress"></div>

<!-- MAIN STAGE -->
<div id="stage">

  <!-- Wireframe iframe -->
  <iframe id="wf-iframe" src="" title="Wireframe"></iframe>

  <!-- Project separator slide -->
  <div id="sep-slide">
    <div class="sep-eyebrow" id="sep-eyebrow"></div>
    <div class="sep-icon" id="sep-icon"></div>
    <div class="sep-title" id="sep-title"></div>
    <div class="sep-desc" id="sep-desc"></div>
    <div class="sep-stats" id="sep-stats"></div>
    <div class="sep-continue">Press <kbd>→</kbd> to begin</div>
  </div>

  <!-- Round break slide -->
  <div class="round-break-slide" id="rb-slide">
    <div class="rb-label" id="rb-label"></div>
    <div class="rb-title" id="rb-title"></div>
    <div class="rb-desc" id="rb-desc"></div>
    <div class="rb-badges" id="rb-badges"></div>
    <div class="sep-continue" style="margin-top:28px;">Press <kbd>→</kbd> to continue</div>
  </div>

</div>

<!-- DRAWER -->
<div id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">Iteration details</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- DETAILS BUTTON -->
<button id="details-btn" onclick="toggleDrawer()">Details ↑</button>

      model: 'Language-first',

// ── STATUS CONFIG ─────────────────────────────────────────────────────────────
const STATUS = {
  primary:    { label: 'Primary ★',   cls: 'badge-primary' },
  fallback:   { label: 'Fallback ★',  cls: 'badge-fallback' },
  parked:     { label: 'Parked',       cls: 'badge-parked' },
  superseded: { label: 'Superseded',   cls: 'badge-superseded' },
  review:     { label: 'Under Review', cls: 'badge-review' },
  candidate:  { label: 'Candidate',    cls: 'badge-candidate' },
  prototype:  { label: 'Prototype',    cls: 'badge-prototype' },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let current = 0;
let drawerOpen = false;

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(idx) {
  current = idx;
  const slide = SLIDES[idx];
  const total = SLIDES.length;

  // Progress bar
  document.getElementById('progress').style.width = ((idx / (total - 1)) * 100) + '%';

  // Nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === total - 1;
  document.getElementById('bar-counter').textContent = `${idx + 1} of ${total}`;

  // Close drawer when navigating
  closeDrawer();

  // Hide all stage elements
  document.getElementById('wf-iframe').style.display = 'none';
  document.getElementById('sep-slide').classList.remove('visible');
  document.getElementById('rb-slide').classList.remove('visible');

  if (slide.type === 'separator') {
    renderSeparator(slide);
  } else if (slide.type === 'roundbreak') {
    renderRoundBreak(slide);
  } else {
    renderWireframe(slide);
  }

  // Top bar
  const hasStatus = slide.status && STATUS[slide.status];
  const chev1 = document.getElementById('bar-chev1');
  const chev2 = document.getElementById('bar-chev2');
  const barRound = document.getElementById('bar-round');

  if (slide.type === 'separator' || slide.type === 'roundbreak') {
    document.getElementById('bar-project').textContent = '';
    barRound.textContent = '';
    document.getElementById('bar-name').textContent = slide.type === 'separator' ? slide.title : slide.title;
    document.getElementById('bar-badge').innerHTML = '';
    chev1.style.display = 'none';
    chev2.style.display = 'none';
    barRound.style.display = 'none';
  } else {
    document.getElementById('bar-project').textContent = slide.project;
    barRound.textContent = slide.round;
    document.getElementById('bar-name').textContent = slide.name;
    document.getElementById('bar-badge').innerHTML = hasStatus
      ? `<span class="badge ${STATUS[slide.status].cls}">${STATUS[slide.status].label}</span>` : '';
    chev1.style.display = '';
    chev2.style.display = '';
    barRound.style.display = '';
  }

  // Details button
  const showDetails = slide.type === 'wireframe' && slide.details;
  document.getElementById('details-btn').classList.toggle('hidden', !showDetails);
}

function renderSeparator(slide) {
  document.getElementById('sep-eyebrow').textContent = slide.eyebrow;
  document.getElementById('sep-icon').textContent = slide.icon;
  document.getElementById('sep-title').textContent = slide.title;
  document.getElementById('sep-desc').textContent = slide.desc;
  document.getElementById('sep-stats').innerHTML = slide.stats.map(s =>
    `<div class="sep-stat"><div class="sep-stat-num">${s.num}</div><div class="sep-stat-label">${s.label}</div></div>`
  ).join('');
  document.getElementById('sep-slide').classList.add('visible');
}

function renderRoundBreak(slide) {
  document.getElementById('rb-label').textContent = slide.label;
  document.getElementById('rb-title').textContent = slide.title;
  document.getElementById('rb-desc').textContent = slide.desc;
  document.getElementById('rb-badges').innerHTML = slide.badges.map(b =>
    `<span class="rb-badge">${b}</span>`
  ).join('');
  document.getElementById('rb-slide').classList.add('visible');
}

function renderWireframe(slide) {
  const iframe = document.getElementById('wf-iframe');
  iframe.style.display = 'block';
  iframe.src = slide.src;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= SLIDES.length) return;
  render(next);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
  if (e.key === 'Escape') closeDrawer();
});

// ── DRAWER ────────────────────────────────────────────────────────────────────
function toggleDrawer() {
  drawerOpen ? closeDrawer() : openDrawer();
}

function openDrawer() {
  const slide = SLIDES[current];
  if (!slide.details) return;
  drawerOpen = true;

  // Populate
  const d = slide.details;
  document.getElementById('drawer-title').textContent = slide.name;

  let html = '';

  if (slide.status && STATUS[slide.status]) {
    html += `<div class="d-section full"><div class="d-label">Status</div><div><span class="badge ${STATUS[slide.status].cls}" style="font-size:12px;padding:4px 10px;">${STATUS[slide.status].label}</span></div></div>`;
  }

  html += `<div class="d-section full"><div class="d-label">Mental Model</div><div class="d-model">${d.model}</div></div>`;
  html += `<div class="d-section full"><div class="d-label">Hypothesis</div><div class="d-text">${d.hypothesis}</div></div>`;

  html += `<div class="d-section"><div class="d-label">Pros</div><ul class="d-list">`;
  d.pros.forEach(p => html += `<li class="d-pro">${p}</li>`);
  html += `</ul></div>`;

  html += `<div class="d-section"><div class="d-label">Cons</div><ul class="d-list">`;
  d.cons.forEach(c => html += `<li class="d-con">${c}</li>`);
  html += `</ul></div>`;

  html += `<div class="d-section full"><div class="d-label">Best for</div><div class="d-best">${d.best}</div></div>`;

  if (d.revival) {
    html += `<div class="d-section full"><div class="d-label">Revival trigger</div><div class="d-revival">⟳ ${d.revival}</div></div>`;
  }
  if (d.note) {
    html += `<div class="d-section full"><div class="d-label">Note</div><div class="d-note">${d.note}</div></div>`;
  }

  document.getElementById('drawer-body').innerHTML = html;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('stage').classList.add('drawer-open');
  document.getElementById('details-btn').textContent = 'Close ↓';
}

function closeDrawer() {
  if (!drawerOpen) return;
  drawerOpen = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('stage').classList.remove('drawer-open');
  document.getElementById('details-btn').textContent = 'Details ↑';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render(0);
</script>
